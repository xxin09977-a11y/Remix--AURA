name: Build Web APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      # ဒီနေရာမှာ Capacitor ကိုသုံးပြီး Android folder ဆောက်မယ်
      - name: Capacitor Build
        run: |
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web-app-apk
          path: "android/app/build/outputs/apk/debug/*.apk"
